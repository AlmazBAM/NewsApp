name: Android CD (Release)

on:
  push:
    branches: ["master", "main", "develop"]

permissions:
  contents: write

jobs:
  build_release:
    name: Build Signing Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties file
        env:
          KS_PASS: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASSWORD }}
          NEWS_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cat << EOF > local.properties
          SIGNING_KEYSTORE_FILE=app/key/keystore.jks
          SIGNING_KEYSTORE_PASSWORD=$KS_PASS
          SIGNING_KEY_ALIAS=$KEY_ALIAS
          SIGNING_KEY_PASSWORD=$KEY_PASS
          NEWS_API_KEY=$NEWS_KEY
          EOF
          
      - name: Decode Google Services
        env:
          GS_JSON_BASE64: ${{ secrets.GS_JSON }}
        run: |
          mkdir -p app
          echo "✅ Secret found. Length: ${#GS_JSON_BASE64} characters"
          printf "%s" "$GS_JSON_BASE64" | tr -d '\n\r ' | base64 --decode > app/google-services.json
          echo "File size: $(stat -c%s app/google-services.json) bytes"
          python3 -m json.tool app/google-services.json > /dev/null && echo "JSON is valid" || echo "JSON IS INVALID"
          ls -lh app/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/key
          echo "$KEYSTORE_BASE64" | base64 --decode > app/key/keystore.jks
          ls -la app/key/keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
